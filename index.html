    <title>Homys</title>

    <!-- Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Single consolidated Google Fonts load (replaces 21 duplicate @import calls) -->

      href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@100;200;300;400;500;600;700;800;900&family=Libre+Baskerville:wght@400;700&family=Roboto:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <!-- Instant background color while bg.png loads -->
    <style>
      body {
        margin: 0;
        background-color: #eee9d5;
        font-family: 'Encode Sans Expanded', sans-serif;
      }
    </style>
  </head>
